<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>CRASH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
:root{--mono:'Share Tech Mono',monospace;--sans:'DM Sans',sans-serif;--bg:#000;--p1:#080808;--p2:#0c0c0c;--b:#1a1a1a;--t:#ccc;--d:#555;--g:#00e676;--r:#ff1744;--gold:#ffab00;--cyan:#00e5ff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);display:flex;justify-content:center;min-height:100vh;font-family:var(--sans);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.app{width:100%;max-width:420px;display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER - trading desk style */
.hdr{display:flex;align-items:center;gap:0;padding:0 12px;background:var(--p1);flex-shrink:0;border-bottom:1px solid var(--b);height:44px}
.hdr .h{cursor:pointer;padding:0 10px;height:44px;display:flex;align-items:center;font-size:11px;font-weight:500;color:var(--d);border-bottom:2px solid transparent;transition:all .15s;font-family:var(--mono);letter-spacing:.5px}
.hdr .h.on,.hdr .h:hover{color:var(--t);border-bottom-color:var(--t)}
.hdr .spacer{flex:1}
.hdr .bal{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--gold);padding:0 8px}
.hdr .bal.sm{font-size:10px;color:var(--d)}

/* GAME CANVAS */
.gc{flex:1;position:relative;overflow:hidden;background:var(--bg)}
canvas{display:block;width:100%;height:100%}

/* TICKER BAR */
.ticker{flex-shrink:0;background:var(--p1);border-top:1px solid var(--b);border-bottom:1px solid var(--b);padding:6px 0;overflow:hidden;height:28px;display:flex;align-items:center}
.ticker .t{font-family:var(--mono);font-size:10px;white-space:nowrap;animation:tick 20s linear infinite;color:var(--d)}
.ticker .t span{margin:0 12px}.ticker .t .g{color:var(--g)}.ticker .t .r{color:var(--r)}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* STATUS LINE */
.status{flex-shrink:0;padding:8px 12px;text-align:center;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--p1);border-bottom:1px solid var(--b)}
.status.w{color:var(--d)}.status.f{color:var(--t)}.status.e{color:var(--r);animation:flash .5s ease-out}
@keyframes flash{0%{background:rgba(255,23,68,.1)}100%{background:transparent}}

/* BET CONTROLS */
.bets{flex-shrink:0;background:var(--p1);padding:12px;border-bottom:1px solid var(--b);display:flex;flex-direction:column;gap:8px}
.bet-row{display:flex;align-items:center;gap:8px}
.bet-row .slot{font-family:var(--mono);font-size:10px;color:var(--d);width:14px;text-align:center}
.bet-row .chips{display:flex;gap:3px;flex:1}
.bet-row .chips span{padding:5px 0;text-align:center;font-weight:500;cursor:pointer;font-size:11px;flex:1;background:var(--p2);color:var(--d);border:1px solid transparent;font-family:var(--mono)}
.bet-row .chips span.on{border-color:var(--t);color:var(--t)}
.bet-row input{background:var(--p2);border:1px solid transparent;padding:7px 4px;text-align:center;color:var(--t);font-family:var(--mono);font-size:12px}
.bet-row input.amt{width:58px}.bet-row input.tp{width:48px;color:var(--r);font-size:10px}
.bet-row input:focus{outline:none;border-color:var(--t)}
.bet-row .dot{color:var(--d);font-size:9px}
.bet-row button{font-family:var(--mono);font-size:10px;font-weight:700;padding:7px 6px;border:1px solid var(--b);cursor:pointer;min-width:50px;text-align:center;text-transform:uppercase;letter-spacing:1px;background:var(--p2);color:var(--t)}
.bet-row button.bet{color:var(--g)}.bet-row button.bet.done{background:rgba(0,230,118,.06);border-color:rgba(0,230,118,.2)}
.bet-row button.out{background:rgba(255,23,68,.06);border-color:var(--r);color:var(--t);display:none;animation:cp .6s ease-in-out infinite}.bet-row button.out.on{display:block}
.bet-row button.res{display:none;min-width:50px;font-weight:700}.bet-row button.win{border-color:rgba(0,230,118,.2);color:var(--g)}.bet-row button.lose{border-color:rgba(255,23,68,.15);color:var(--r)}
@keyframes cp{0%,100%{opacity:.7}50%{opacity:1}}

/* BOTTOM NAV */
.nav{flex-shrink:0;background:var(--p1);padding:6px 10px;border-top:1px solid var(--b);display:flex;gap:4px}
.nav .n{flex:1;background:transparent;padding:8px 0;text-align:center;font-size:9px;font-weight:500;color:var(--d);cursor:pointer;border:none;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.nav .n:active,.nav .n:hover{color:var(--t)}.nav .n i{display:block;font-size:14px;margin-bottom:1px;font-style:normal}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:80;display:flex;align-items:center;justify-content:center;animation:fi .12s}
@keyframes fi{0%{opacity:0}100%{opacity:1}}
.mdl{background:var(--p1);border:1px solid var(--b);width:92%;max-width:360px;max-height:80vh;overflow-y:auto}
.mdl-h{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b);font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase}.mdl-h span{cursor:pointer;color:var(--d);font-size:16px}
.mdl-b{padding:14px}
.mdl .opt{display:flex;align-items:center;gap:8px;padding:10px;background:var(--p2);margin-bottom:4px;cursor:pointer;border:1px solid transparent}.mdl .opt:active{border-color:var(--b)}.mdl .opt.hl{border-color:rgba(255,171,0,.2);background:rgba(255,171,0,.04)}
.mdl .opt .oi{font-size:22px}.mdl .opt .on{flex:1;font-size:12px;font-weight:500}.mdl .opt .os{font-size:10px;color:var(--d)}.mdl .opt .op{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--gold)}
.mdl .g2{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.mdl .g2 .g{background:var(--p2);padding:10px 6px;text-align:center;cursor:pointer;border:1px solid transparent}.mdl .g2 .g:active{border-color:var(--b)}.mdl .g2 .g .gi{font-size:22px}.mdl .g2 .g .gn{font-size:10px;font-weight:500;margin:2px 0}.mdl .g2 .g .gd{font-size:8px;color:var(--d)}.mdl .g2 .g .gc{font-family:var(--mono);font-weight:700;font-size:10px;color:var(--gold)}
.mdl .buy{display:flex;justify-content:space-between;padding:10px 12px;background:var(--p2);margin-bottom:3px;cursor:pointer;border:1px solid transparent;font-size:12px}.mdl .buy:active{border-color:var(--b)}.mdl .buy.best{background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.2)}.mdl .buy .bp{font-family:var(--mono);font-weight:700;color:var(--gold)}
.mdl input.txt{width:100%;background:var(--p2);border:1px solid var(--b);padding:10px;color:var(--t);font-family:var(--mono);font-size:11px;text-align:center;margin-bottom:6px}.mdl input.txt:focus{outline:none;border-color:var(--t)}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:11px;font-weight:700;padding:8px 16px;letter-spacing:1px;z-index:100;pointer-events:none;animation:ti .15s ease-out,to .25s 1.2s ease-out forwards;border:1px solid}
.toast.n{background:#000;color:var(--gold);border-color:rgba(255,171,0,.2)}.toast.r{background:#000;color:var(--g);border-color:rgba(0,230,118,.15)}.toast.l{background:#000;color:var(--cyan);border-color:rgba(0,229,255,.15)}
@keyframes ti{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to{0%{opacity:1}100%{opacity:0}}

/* MINER PAGE */
.mp{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;animation:fi .15s}.mp.on{display:flex}
.mp .mt{display:flex;align-items:center;padding:10px 12px;background:var(--p1);border-bottom:1px solid var(--b);gap:8px;font-family:var(--mono)}.mp .mt .back{color:var(--d);cursor:pointer;font-size:14px}
.mp .mcv{flex:1;position:relative;overflow:hidden;background:#1a2740}.mp .mcv canvas{display:block;width:100%;height:100%}
.mp .mb{display:flex;gap:5px;padding:8px;overflow-x:auto;background:var(--p1);border-top:1px solid var(--b)}
.mp .mb .mc{flex:0 0 82px;background:var(--p2);padding:10px 4px;text-align:center;cursor:pointer;border:1px solid transparent}.mp .mb .mc:active{border-color:var(--b)}.mp .mb .mc.ow{border-color:rgba(0,230,118,.15)}.mp .mb .mc.at{border-color:var(--gold)}.mp .mb .mc .i{font-size:24px}.mp .mb .mc .n{font-size:9px;font-weight:500;margin:2px 0}.mp .mb .mc .s{font-size:7px;color:var(--d)}.mp .mb .mc .c{font-family:var(--mono);font-weight:700;font-size:9px;color:var(--gold)}
</style>
</head>
<body>
<div class="app">
<!-- HEADER -->
<div class="hdr">
  <span class="h on">CRASH</span>
  <span class="h">MINE</span>
  <span class="spacer"></span>
  <span class="bal" id="cD">500</span>
  <span class="bal sm">GOLD</span>
  <span class="bal sm" style="color:var(--d)">|</span>
  <span class="bal sm" id="hDisp">3🆓</span>
  <span class="bal sm" id="gDisp">10🎮</span>
  <span class="bal sm" style="cursor:pointer" id="btnProfile">👤</span>
</div>

<!-- GAME -->
<div class="gc" id="gameWrap"><canvas id="gcC"></canvas></div>

<!-- TICKER -->
<div class="ticker"><div class="t" id="tickerEl"></div></div>

<!-- STATUS -->
<div class="status w" id="roundBar">PLACE YOUR BETS</div>

<!-- BETS -->
<div class="bets">
  <div class="bet-row"><span class="slot">A</span><div class="chips" id="q1"><span class="on" data-v="1">1</span><span data-v="5">5</span><span data-v="10">10</span></div><input class="amt" id="in1" value="1" type="number" inputmode="numeric"><span class="dot">×</span><input class="tp" id="ac1" value="" placeholder="auto" type="number" inputmode="decimal" step="0.1"><button class="bet" id="bt1">BET</button><button class="out" id="co1">EXIT</button><button class="res" id="re1">--</button></div>
  <div class="bet-row"><span class="slot">B</span><div class="chips" id="q2"><span data-v="1">1</span><span class="on" data-v="5">5</span><span data-v="10">10</span></div><input class="amt" id="in2" value="5" type="number" inputmode="numeric"><span class="dot">×</span><input class="tp" id="ac2" value="" placeholder="auto" type="number" inputmode="decimal" step="0.1"><button class="bet" id="bt2">BET</button><button class="out" id="co2">EXIT</button><button class="res" id="re2">--</button></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="n" id="btnShop"><i>💎</i>SHOP</button>
  <button class="n" id="btnRank"><i>🏆</i>RANK</button>
  <button class="n" id="btnInvite"><i>📤</i>INVITE</button>
</div>

<!-- MINER PAGE -->
<div class="mp" id="minerPg">
  <div class="mt"><span class="back" id="minerBack">←</span><span style="flex:1;color:var(--gold);font-weight:700">🪙 <span id="mG">0</span></span><span style="color:var(--d)">⛏ <span id="mR">0</span>/s</span></div>
  <div class="mcv" id="minerCv"><canvas id="mc"></canvas></div>
  <div class="mb" id="minerCd"></div>
</div>
</div>

<script>
// ═══ STATE ═══
let user={id:'p_'+Math.random().toString(36).slice(2,8),name:'trader_'+Math.random().toString(36).slice(2,5)};
if(window.Telegram?.WebApp){const tg=window.Telegram.WebApp;tg.ready();user.id=tg.initDataUnsafe?.user?.id||user.id;user.name=tg.initDataUnsafe?.user?.first_name||tg.initDataUnsafe?.user?.username||user.name;tg.expand()}
try{const s=JSON.parse(localStorage.getItem('ru'));if(s)user={...user,...s}}catch(e){}
function su(){localStorage.setItem('ru',JSON.stringify(user))}su();

const S={gold:500,hash:0,th:30,coins:10,free:3,am:0,me:0};
const M=[{n:'Free',i:'⛏️',r:3/86400,u:'$0',d:'3/day'},{n:'T1',i:'🧑‍🌾',r:38.87/86400,u:'$2.99',d:'~39/day'},{n:'T2',i:'👷',r:103.87/86400,u:'$7.99',d:'~104/day'},{n:'T3',i:'🦺',r:259.87/86400,u:'$19.99',d:'~260/day'},{n:'T4',i:'🤖',r:649.87/86400,u:'$49.99',d:'~650/day'}];
const RK=[{n:'CryptoKing',g:8520000},{n:'MineMaster',g:6230000},{n:'GoldRush',g:4910000},{n:'DeepMiner',g:3840000},{n:'HookLord',g:2750000}];

// ═══ CANVAS ═══
const gw=document.getElementById('gameWrap'),gc=document.getElementById('gcC'),gx=gc.getContext('2d');
let W=800,H=600;function rs(){const r=gw.getBoundingClientRect();if(r.width<10)return;W=gc.width=r.width*2;H=gc.height=r.height*2}rs();if(W<20)setTimeout(()=>{rs();draw();startCD()},500);window.addEventListener('resize',()=>{rs();draw()});

const hist=[];let pts=[],phase='wait',pT=3,mult=1,cp=0,bets=[null,null],boost=1,boostT=0,autoC=[0,0],inv=0,scd=0;

function genCP(){const r=Math.random();if(r<.015)return 1;if(r<.38)return 1.1+Math.random()*1.5;if(r<.68)return 2.5+Math.random()*3;if(r<.86)return 5+Math.random()*8;if(r<.96)return 10+Math.random()*25;return 30+Math.random()*120}

function draw(){
  gx.clearRect(0,0,W,H);const cx=W/2;
  // Grid
  gx.strokeStyle='rgba(255,255,255,.02)';for(let i=1;i<20;i++){gx.beginPath();gx.moveTo(0,i*H*.025);gx.lineTo(W,i*H*.025);gx.stroke()}for(let i=1;i<10;i++){gx.beginPath();gx.moveTo(i*W*.1,0);gx.lineTo(i*W*.1,H*.55);gx.stroke()}
  gx.strokeStyle='rgba(255,255,255,.04)';gx.lineWidth=1;gx.beginPath();gx.moveTo(cx,0);gx.lineTo(cx,H*.55);gx.stroke();

  const dm=phase==='fly'?mult:(phase==='end'?cp:1);
  // Countdown circle
  if(phase==='wait'&&pT>0){const sec=Math.ceil(pT);gx.strokeStyle='rgba(255,255,255,.08)';gx.lineWidth=2;gx.beginPath();gx.arc(cx,H*.38,44,0,Math.PI*2);gx.stroke();gx.fillStyle='#fff';gx.font='bold 40px "Share Tech Mono",monospace';gx.textAlign='center';gx.fillText(sec,cx,H*.38+13)}
  // Multiplier
  gx.fillStyle=phase==='end'?'#ff1744':phase==='fly'?'#00e676':'rgba(255,255,255,.06)';gx.font=`bold ${phase==='fly'?64:36}px "Share Tech Mono",monospace`;gx.textAlign='center';
  if(phase!=='wait'||pT<=0)gx.fillText(dm.toFixed(2)+'×',cx,phase==='fly'?H*.2:H*.14);
  // Rocket
  if(phase==='fly'||phase==='end'){
    const ry=H*.08+(1-dm/15)*H*.24,cy=Math.max(H*.03,Math.min(H*.35,ry));
    // Trail
    if(phase==='fly'){for(let i=0;i<3;i++){gx.fillStyle=`rgba(255,171,0,${.15-i*.04})`;gx.beginPath();gx.arc(cx,cy+10+i*8,4-i,0,Math.PI*2);gx.fill()}}
    const gd=gx.createLinearGradient(cx,cy-18,cx,cy+12);gd.addColorStop(0,'#fff');gd.addColorStop(.5,'#ccc');gd.addColorStop(1,'#666');gx.fillStyle=gd;gx.beginPath();gx.moveTo(cx,cy-18);gx.quadraticCurveTo(cx+9,cy-3,cx+9,cy+8);gx.lineTo(cx-9,cy+8);gx.quadraticCurveTo(cx-9,cy-3,cx,cy-18);gx.fill();
    gx.fillStyle='#ff1744';gx.beginPath();gx.moveTo(cx-9,cy+2);gx.lineTo(cx-13,cy+10);gx.lineTo(cx-7,cy+7);gx.fill();gx.beginPath();gx.moveTo(cx+9,cy+2);gx.lineTo(cx+13,cy+10);gx.lineTo(cx+7,cy+7);gx.fill();
    gx.fillStyle='#ff1744';gx.beginPath();gx.moveTo(cx,cy-24);gx.quadraticCurveTo(cx+4,cy-12,cx+7,cy-18);gx.quadraticCurveTo(cx-7,cy-18,cx-4,cy-12);gx.fill();
    if(phase==='end')for(let i=0;i<10;i++){gx.fillStyle=`rgba(255,23,68,${Math.random()*.2})`;gx.beginPath();gx.arc(cx+(Math.random()-.5)*24,cy+(Math.random()-.5)*12,1+Math.random()*2,0,Math.PI*2);gx.fill()}
  }else if(pT<=0){gx.font='32px sans-serif';gx.textAlign='center';gx.fillText('🚀',cx,H*.3)}
  pts=pts.filter(p=>p.life>0);pts.forEach(p=>{p.life-=.014;p.y-=p.vy;p.vy+=.05;p.x+=p.vx;gx.globalAlpha=p.life;gx.fillStyle=p.c;gx.beginPath();gx.arc(p.x,p.y,p.s,0,Math.PI*2);gx.fill()});gx.globalAlpha=1;
}
setInterval(()=>{if(phase==='fly')draw()},40);

function startCD(){phase='wait';mult=1;cp=0;bets=[null,null];ub();document.getElementById('roundBar').textContent='PLACE YOUR BETS';document.getElementById('roundBar').className='status w';pT=3;draw();let cd=setInterval(()=>{pT--;document.getElementById('roundBar').textContent='ROUND IN '+Math.ceil(pT)+'s';draw();if(pT<=0){clearInterval(cd);startFly()}},1000)}
function startFly(){phase='fly';mult=1;cp=genCP();ub();document.getElementById('roundBar').textContent='FLYING';document.getElementById('roundBar').className='status f';(function step(){if(phase!=='fly')return;mult+=.02+mult*.003;if(Math.floor(mult*10)%3===0)draw();bets.forEach((b,i)=>{if(b&&!b.cashedOut){const t=b.ac||autoC[i];if(t&&mult>=t)cashOut(i)}});if(mult>=cp){endR(false);return}requestAnimationFrame(step)})()}
function endR(cashed){phase='end';cp=cashed?mult:cp;hist.unshift(cp);if(hist.length>30)hist.pop();rh();bets.forEach((b,i)=>{if(b&&!b.cashedOut){b.cashedOut=true;b.cm=cp;b.won=0}});for(let i=0;i<20;i++)pts.push({x:W/2,y:H*.2,vx:(Math.random()-.5)*6,vy:-Math.random()*4,s:1+Math.random()*3,c:cashed?'#00e676':i%2?'#ff1744':'#ffab00',life:1});document.getElementById('roundBar').textContent=cashed?`EXIT @ ${cp.toFixed(2)}×`:`CRASH @ ${cp.toFixed(2)}×`;document.getElementById('roundBar').className='status e';ub();sr();draw();setTimeout(startCD,3000)}
function pb(s){if(phase!=='wait')return;const a=Math.max(1,Math.min(10000,parseInt(document.getElementById('in'+(s+1)).value)||1));document.getElementById('in'+(s+1)).value=a;const ac=parseFloat(document.getElementById('ac'+(s+1)).value);autoC[s]=ac>=1.01?parseFloat(ac.toFixed(2)):0;let ok=false;if(S.free>0){S.free--;ok=true}else if(S.coins>=a){S.coins-=a;ok=true}else{const gn=a*10;if(S.gold>=gn){S.gold-=gn;ok=true}else{toast('MAX: '+Math.floor(S.coins+S.gold/10),'n');return}}if(!ok)return;bets[s]={amt:a,cashedOut:false,cm:0,won:undefined,ac:autoC[s]};document.getElementById('bt'+(s+1)).textContent=autoC[s]?'🎯':'✓';document.getElementById('bt'+(s+1)).classList.add('done');document.getElementById('co'+(s+1)).classList.add('on');ud()}
function cashOut(s){if(phase!=='fly'||!bets[s]||bets[s].cashedOut)return;const wa=bets[s].ac&&mult>=bets[s].ac;bets[s].cashedOut=true;bets[s].cm=mult;bets[s].won=Math.floor(bets[s].amt*mult);S.gold+=bets[s].won;document.getElementById('co'+(s+1)).classList.remove('on');document.getElementById('re'+(s+1)).textContent=(wa?'🎯':'')+'+'+bets[s].won;document.getElementById('re'+(s+1)).className='res win';document.getElementById('re'+(s+1)).style.display='block';toast((wa?'AUTO ':'')+'+'+bets[s].won+'','r');if(mult>=5&&scd<Date.now()){scd=Date.now()+6e4;setTimeout(()=>{S.coins+=2;toast('SHARE +2🎮','r');ud()},800)};ud()}
function sr(){setTimeout(()=>{bets.forEach((b,i)=>{if(!b)return;const r=document.getElementById('re'+(i+1));r.style.display='block';if(b.won===undefined||b.won<=0){r.textContent='LOST';r.className='res lose'}else{r.textContent='+'+b.won;r.className='res win'}document.getElementById('co'+(i+1)).classList.remove('on')})},200);setTimeout(ub,2500)}
function ub(){['bt1','bt2'].forEach((id,i)=>{const bb=document.getElementById(id),cb=document.getElementById('co'+(i+1)),re=document.getElementById('re'+(i+1));re.style.display='none';if(phase==='wait'){cb.classList.remove('on');if(bets[i]){bb.textContent='✓';bb.classList.add('done')}else{bb.textContent='BET';bb.classList.remove('done')}}else if(phase==='fly'){bb.textContent='--';bb.classList.remove('done');if(bets[i]&&!bets[i].cashedOut)cb.classList.add('on');else cb.classList.remove('on')}})}
function rh(){document.getElementById('tickerEl').innerHTML=hist.map(m=>`<span class="${m>=2?'g':'r'}">${m.toFixed(2)}×</span>`).join('')}

function dm(){Mgx.clearRect(0,0,MW,MH);const cx=MW/2,t=Date.now()*.001,a=S.am>0&&S.me>Date.now()/1000,tr=a?S.am:0,sy=MH*.55;const sky=Mgx.createLinearGradient(0,0,0,sy);sky.addColorStop(0,'#1e3a5f');sky.addColorStop(.5,'#2a5080');sky.addColorStop(1,'#3a6090');Mgx.fillStyle=sky;Mgx.fillRect(0,0,MW,sy);Mgx.fillStyle='rgba(255,255,255,.3)';[{x:.1,y:.08,r:16},{x:.5,y:.05,r:20}].forEach(cl=>{Mgx.beginPath();Mgx.arc(cl.x*MW,cl.y*MH,cl.r,0,Math.PI*2);Mgx.fill()});const gd=Mgx.createLinearGradient(0,sy,0,MH);gd.addColorStop(0,'#8b6914');gd.addColorStop(1,'#3b2508');Mgx.fillStyle=gd;Mgx.fillRect(0,sy,MW,MH-sy);Mgx.fillStyle='#a07020';Mgx.fillRect(0,sy,MW,3);if(a){const rx=cx+80,ry=sy-8,rr=28+Math.sin(t*5)*3;const og=Mgx.createRadialGradient(rx-rr*.1,ry-rr*.2,rr*.05,rx,ry,rr);og.addColorStop(0,'#fef3c7');og.addColorStop(.3,'#fbbf24');og.addColorStop(1,'#78350f');Mgx.fillStyle=og;Mgx.beginPath();Mgx.arc(rx,ry,rr,0,Math.PI*2);Mgx.fill();Mgx.fillStyle='rgba(255,255,255,.25)';Mgx.beginPath();Mgx.arc(rx-rr*.15,ry-rr*.2,rr*.18,0,Math.PI*2);Mgx.fill();for(let i=0;i<tr*2+2;i++){Mgx.fillStyle=`rgba(251,191,36,${.2+Math.random()*.35})`;Mgx.beginPath();Mgx.arc(rx+(Math.random()-.5)*30,ry-Math.random()*20,1+Math.random()*2,0,Math.PI*2);Mgx.fill()}}const mx=cx-50,my=sy-80;Mgx.fillStyle='rgba(0,0,0,.08)';Mgx.beginPath();Mgx.ellipse(cx-30,sy+4,14,3,0,0,Math.PI*2);Mgx.fill();const bc=a?(tr>=4?'#7c3aed':tr>=3?'#22c55e':tr>=2?'#2563eb':'#d97706'):'#9ca3af';Mgx.fillStyle=bc;Mgx.fillRect(mx-1,my+30,20,24);Mgx.fillStyle='#f5d0a9';Mgx.beginPath();Mgx.arc(mx+9,my+16,12,13,0,0,Math.PI*2);Mgx.fill();Mgx.fillStyle='#4a3728';Mgx.beginPath();Mgx.arc(mx+9,my+8,13,Math.PI,Math.PI*2);Mgx.fill();Mgx.fillStyle='#fbbf24';Mgx.beginPath();Mgx.ellipse(mx+9,my+2,14,5,0,Math.PI,0);Mgx.fill();Mgx.fillStyle='#d97706';Mgx.fillRect(mx-5,my-1,28,4);Mgx.fillStyle=bc;Mgx.fillRect(mx-8,my+32,6,16);Mgx.fillRect(mx+19,my+32,6,16);if(a){Mgx.fillStyle='#1a0a02';Mgx.beginPath();Mgx.arc(mx+4,my+13,2,2.5,0,Math.PI*2);Mgx.fill();Mgx.beginPath();Mgx.arc(mx+14,my+13,2,2.5,0,Math.PI*2);Mgx.fill()}Mgx.fillStyle='rgba(0,0,0,.45)';Mgx.fillRect(0,sy+25,MW,28);Mgx.fillStyle='#fff';Mgx.font='bold 13px "Share Tech Mono",monospace';Mgx.textAlign='center';if(a)Mgx.fillText('⛏ +'+Math.floor(M[tr].r*3600)+'/HR | TAP ×'+(2+Math.floor(tr/2)),cx,sy+43);else Mgx.fillText('SELECT A MINER TO START',cx,sy+43);document.getElementById('mG').textContent=S.gold.toLocaleString();document.getElementById('mR').textContent=a?M[tr].r.toFixed(6):'0';maf=requestAnimationFrame(dm)}

document.getElementById('minerCd').addEventListener('click',e=>{const c=e.target.closest('.mc');if(!c)return;const i=parseInt(c.dataset.mi),m=M[i],now=Date.now()/1000;if(i===0){if(S.me>now){toast('ACTIVE','n');return}S.am=0;S.me=now+86400;toast('FREE 24H','r');rmc();ud();return}if(S.am===i+1&&S.me>now){toast('⏳ '+Math.ceil((S.me-now)/3600)+'H','n');return}popup(m.n,'<div style="text-align:center"><div style="font-size:36px">'+m.i+'</div><div style="font-weight:700;font-size:14px;margin:6px 0">'+m.n+'</div><div style="color:var(--d);font-size:11px">'+m.d+'</div><div style="font-family:var(--mono);font-size:20px;font-weight:900;color:#ffab00;margin:8px 0">'+m.u+'</div><div style="font-size:8px;color:var(--d);margin-bottom:8px">USDT TRC20 · DM @your_bot</div><div class="buy" style="justify-content:center;background:#00e676;color:#000;font-weight:700" id="db'+i+'">DEMO ACTIVATE</div></div>',()=>{document.getElementById('db'+i).onclick=()=>{S.am=i+1;S.me=Date.now()/1000+86400;toast('⛏ '+m.n+' 24H','r');document.getElementById('ap')?.remove();rmc();ud()}})});
document.getElementById('minerCv').addEventListener('click',e=>{const now=Date.now()/1000;if(!(S.am>0&&S.me>now)){toast('BUY MINER FIRST','n');return}if(boostT>now){toast('⚡ '+boost+'× '+Math.ceil(boostT-now)+'S','n');return}boost=2+Math.floor(S.am/2);boostT=now+15;toast('⚡ '+boost+'× 15S','r');if(scd<Date.now()){scd=Date.now()+6e4;setTimeout(()=>{S.free++;toast('SHARE +1🆓','r');ud()},1200)}const r=document.getElementById('minerCv').getBoundingClientRect();const fn=document.createElement('div');fn.style.cssText='position:absolute;left:'+(e.clientX-r.left-15)+'px;top:'+(e.clientY-r.top-8)+'px;color:#00e5ff;font-weight:900;font-size:18px;pointer-events:none;z-index:70;animation:fl .8s ease-out forwards';fn.textContent=boost+'×';document.getElementById('minerCv').appendChild(fn);setTimeout(()=>fn.remove(),800)});
const ms=document.createElement('style');ms.textContent='@keyframes fl{0%{opacity:1;transform:translateY(0) scale(.7)}100%{opacity:0;transform:translateY(-60px) scale(1.2)}}';document.head.appendChild(ms);

setInterval(()=>{const now=Date.now()/1000;let r=3/86400;if(S.am>0&&S.me>now)r+=M[S.am].r;if(S.me<=now&&S.am>0)S.am=0;if(now<boostT)r*=boost;else boost=1;S.gold+=r;ud()},1000);
