<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>CRASH</title>
<style>
:root{--bg:#060910;--p1:#0b1018;--p2:#111820;--b1:#1e2a3a;--b2:#2a3a50;--t1:#e8ecf2;--t2:#8899aa;--t3:#445566;--g:#00e676;--r:#ff3d4f;--y:#ffb300;--c:#00e5ff;--pr:#b400ff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);display:flex;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;font-size:14px}
.app{width:100%;max-width:420px;display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--p1);flex-shrink:0;border-bottom:1px solid var(--b1);font-size:14px;font-weight:700}
.hdr .gold{color:var(--y);flex:1;display:flex;align-items:center;gap:6px;cursor:pointer}
.hdr .tag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:4px}
.hdr .tag.f{color:var(--g);background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.15)}
.hdr .tag.c{color:var(--y);background:rgba(255,179,0,.06);border:1px solid rgba(255,179,0,.15)}
.hdr .tag.u{cursor:pointer;color:var(--t2);font-size:13px;padding:4px 6px}

/* GAME */
.game{flex:1;position:relative;background:var(--bg);border-bottom:1px solid var(--b1);overflow:hidden;min-height:0}
.game::after{content:'';position:absolute;inset:0;border:2px solid rgba(0,229,255,.06);pointer-events:none;z-index:5}
canvas{display:block;width:100%;height:100%}

/* TICKER */
.tk{flex-shrink:0;background:var(--p1);border-bottom:1px solid var(--b1);padding:6px 0;overflow:hidden;height:26px;display:flex;align-items:center}
.tk .t{font-size:12px;font-weight:600;white-space:nowrap;animation:tk 25s linear infinite;color:var(--t3)}
.tk .t span{margin:0 10px}.tk .t .g{color:var(--g)}.tk .t .r{color:var(--r)}
@keyframes tk{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* STATUS */
.st{flex-shrink:0;padding:10px 14px;text-align:center;font-size:16px;font-weight:800;letter-spacing:2px;background:var(--p1);border-bottom:1px solid var(--b1);color:var(--t2);text-transform:uppercase}
.st.go{color:var(--t1);text-shadow:0 0 12px rgba(255,255,255,.2)}..st.over{color:var(--r)}

/* BETS */
.bp{flex-shrink:0;background:var(--p1);padding:12px 14px;border-bottom:1px solid var(--b1)}
.br{display:flex;align-items:center;gap:8px;margin-bottom:8px}.br:last-child{margin-bottom:0}
.br .id{color:var(--t3);font-weight:700;font-size:15px;width:18px;text-align:center}
.br .ch{display:flex;gap:4px;flex:1}
.br .ch b{flex:1;padding:8px 0;text-align:center;font-weight:700;cursor:pointer;font-size:14px;background:var(--p2);color:var(--t3);border:1px solid var(--b1);border-radius:4px;transition:all .1s}
.br .ch b.on{border-color:var(--c);color:var(--c);background:rgba(0,229,255,.04)}
.br input{background:var(--p2);border:1px solid var(--b1);border-radius:4px;padding:8px 4px;text-align:center;color:var(--t1);font-weight:700;font-size:14px}
.br input.amt{width:58px}.br input.tp{width:48px;color:var(--r);font-size:12px}
.br input:focus{outline:none;border-color:var(--c)}
.br .dot{color:var(--t3);font-size:12px}
.br button{font-weight:800;font-size:13px;padding:8px 8px;border-radius:4px;border:1px solid;cursor:pointer;min-width:52px;text-align:center;letter-spacing:.5px}
.br button.bet{background:rgba(0,229,255,.04);color:var(--c);border-color:rgba(0,229,255,.2)}.br button.bet.ok{background:rgba(0,230,118,.06);color:var(--g);border-color:rgba(0,230,118,.25)}
.br button.out{background:rgba(255,61,79,.08);color:var(--t1);border-color:var(--r);display:none;animation:cp .6s ease-in-out infinite}.br button.out.on{display:block}
.br button.res{display:none;min-width:52px;font-weight:800;font-size:13px}.br button.win{color:var(--g);border-color:rgba(0,230,118,.2)}.br button.lose{color:var(--r);border-color:rgba(255,61,79,.15)}
@keyframes cp{0%,100%{opacity:.7}50%{opacity:1}}

/* BOTTOM */
.nv{flex-shrink:0;background:var(--p1);padding:8px 10px;border-top:1px solid var(--b1);display:flex;gap:6px}
.nv span{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;border-radius:4px;border:1px solid transparent;transition:all .1s}.nv span:active,.nv span:hover{color:var(--t1);background:var(--p2)}.nv span i{display:block;font-size:18px;margin-bottom:2px;font-style:normal}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(4,6,12,.92);z-index:80;display:flex;align-items:center;justify-content:center;animation:fi .1s}
@keyframes fi{0%{opacity:0}100%{opacity:1}}
.mdl{background:var(--p1);border:1px solid var(--b1);border-radius:6px;width:92%;max-width:360px;max-height:80vh;overflow-y:auto}
.mdl-h{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b1);font-size:14px;font-weight:800;letter-spacing:1px;color:var(--t2)}.mdl-h span{cursor:pointer;color:var(--t3);font-size:18px}
.mdl-b{padding:12px 14px}
.mdl .row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--p2);margin-bottom:3px;cursor:pointer;border:1px solid transparent;border-radius:4px;font-size:13px}.mdl .row:active{border-color:var(--b1)}.mdl .row .ri{font-size:22px}.mdl .row .rn{flex:1;font-weight:600}.mdl .row .rp{font-weight:800;color:var(--y)}
.mdl .buy{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--p2);margin-bottom:3px;cursor:pointer;border:1px solid transparent;border-radius:4px;font-size:14px;font-weight:600}.mdl .buy:active{border-color:var(--b1)}.mdl .buy .bp{font-weight:800;color:var(--y);font-size:15px}.mdl .buy.hl{background:rgba(180,0,255,.04);border-color:rgba(180,0,255,.15)}
.mdl .g2{display:grid;grid-template-columns:1fr 1fr;gap:4px}.mdl .g2 .g{background:var(--p2);padding:12px 6px;text-align:center;cursor:pointer;border:1px solid transparent;border-radius:4px}.mdl .g2 .g:active{border-color:var(--b1)}.mdl .g2 .g .gi{font-size:22px}.mdl .g2 .g .gn{font-size:12px;font-weight:600;margin:3px 0}.mdl .g2 .g .gd{font-size:10px;color:var(--t3)}.mdl .g2 .g .gc{font-weight:800;font-size:12px;color:var(--y)}
.mdl .tab-row{display:flex;gap:4px;margin-bottom:10px}.mdl .tab-row span{flex:1;text-align:center;padding:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--p2);color:var(--t3);border-radius:4px;border:1px solid transparent}.mdl .tab-row span.on{color:var(--c);border-color:rgba(0,229,255,.2)}
.mdl input.txt{width:100%;background:var(--p2);border:1px solid var(--b1);border-radius:4px;padding:10px;color:var(--t1);font-weight:600;font-size:13px;text-align:center;margin-bottom:6px}.mdl input.txt:focus{outline:none;border-color:var(--c)}

.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-weight:700;padding:8px 16px;border-radius:4px;font-size:13px;z-index:100;pointer-events:none;animation:ti .12s ease-out,to .2s 1.2s ease-out forwards;border:1px solid}
.toast.g{background:rgba(0,15,5,.95);color:var(--g);border-color:rgba(0,230,118,.2)}.toast.r{background:rgba(15,0,5,.95);color:var(--r);border-color:rgba(255,61,79,.2)}.toast.y{background:rgba(15,10,0,.95);color:var(--y);border-color:rgba(255,179,0,.2)}
@keyframes ti{0%{opacity:0;transform:translateX(-50%) translateY(-6px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to{0%{opacity:1}100%{opacity:0}}

/* MINER */
.mp{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;animation:fi .12s}.mp.on{display:flex}
.mp .mt{display:flex;align-items:center;padding:10px 14px;background:var(--p1);border-bottom:1px solid var(--b1);gap:8px;font-weight:700;font-size:14px}.mp .mt .back{color:var(--t3);cursor:pointer;font-size:16px}
.mp .mcv{flex:1;position:relative;overflow:hidden;background:#0c2640}.mp .mcv canvas{display:block;width:100%;height:100%}
.mp .mb{display:flex;gap:5px;padding:8px;overflow-x:auto;background:var(--p1);border-top:1px solid var(--b1)}.mp .mb .mc{flex:0 0 86px;background:var(--p2);padding:10px 4px;text-align:center;cursor:pointer;border:1px solid transparent;border-radius:4px}.mp .mb .mc:active{border-color:var(--b1)}.mp .mb .mc.at{border-color:var(--c)}.mp .mb .mc .i{font-size:24px}.mp .mb .mc .n{font-weight:700;font-size:11px;margin:2px 0}.mp .mb .mc .s{font-size:8px;color:var(--t3)}.mp .mb .mc .c{font-weight:800;font-size:10px;color:var(--y)}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <span class="gold">🪙 <span id="cD">0</span></span>
  <span class="tag f">🆓<span id="fD">3</span></span>
  <span class="tag c">🎮<span id="gD">10</span></span>
  <span class="tag u" id="btnProfile">👤 <span id="userName">--</span></span>
</div>

<!-- GAME - compact height -->
<div class="game" id="gameWrap"><canvas id="gcC"></canvas></div>

<!-- TICKER -->
<div class="tk"><div class="t" id="tickerEl"></div></div>

<!-- STATUS -->
<div class="st" id="roundBar">PLACE BETS</div>

<!-- BETS -->
<div class="bp">
  <div class="br"><span class="id">A</span><div class="ch" id="q1"><b class="on" data-v="1">1</b><b data-v="5">5</b><b data-v="10">10</b></div><input class="amt" id="in1" value="1" type="number" inputmode="numeric"><span class="dot">×</span><input class="tp" id="ac1" placeholder="AUTO" type="number" inputmode="decimal"><button class="bet" id="bt1">BET</button><button class="out" id="co1">EXIT</button><button class="res" id="re1">--</button></div>
  <div class="br"><span class="id">B</span><div class="ch" id="q2"><b data-v="1">1</b><b class="on" data-v="5">5</b><b data-v="10">10</b></div><input class="amt" id="in2" value="5" type="number" inputmode="numeric"><span class="dot">×</span><input class="tp" id="ac2" placeholder="AUTO" type="number" inputmode="decimal"><button class="bet" id="bt2">BET</button><button class="out" id="co2">EXIT</button><button class="res" id="re2">--</button></div>
  <div class="br"><span class="id">C</span><div class="ch" id="q3"><b data-v="1">1</b><b class="on" data-v="5">5</b><b data-v="10">10</b></div><input class="amt" id="in3" value="10" type="number" inputmode="numeric"><span class="dot">×</span><input class="tp" id="ac3" placeholder="AUTO" type="number" inputmode="decimal"><button class="bet" id="bt3">BET</button><button class="out" id="co3">EXIT</button><button class="res" id="re3">--</button></div>
</div>

<!-- NAV -->
<div class="nv">
  <span id="btnMine"><i>⛏</i>MINE</span>
  <span id="btnShop"><i>💎</i>SHOP</span>
  <span id="btnRank"><i>🏆</i>RANK</span>
  <span id="btnInvite"><i>📤</i>INVITE</span>
</div>

<div class="mp" id="minerPg">
  <div class="mt"><span class="back" id="minerBack">←</span><span style="color:var(--y);flex:1">🪙 <span id="mG">0</span></span><span style="color:var(--t2);font-size:12px">⛏ <span id="mR">0</span>/s</span></div>
  <div class="mcv" id="minerCv"><canvas id="mc"></canvas></div>
  <div class="mb" id="minerCd"></div>
</div>
</div>

<script>
// State
let user={id:'p'+Math.random().toString(36).slice(2,8),name:'Player_'+Math.random().toString(36).slice(2,4)};
if(window.Telegram?.WebApp){const t=window.Telegram.WebApp;t.ready();user={id:t.initDataUnsafe?.user?.id||user.id,name:t.initDataUnsafe?.user?.first_name||t.initDataUnsafe?.user?.username||user.name};t.expand()}
try{const s=JSON.parse(localStorage.getItem('ru'));if(s)user={...user,...s}}catch(e){}
function su(){localStorage.setItem('ru',JSON.stringify(user))}su();

const S={gold:500,hash:0,th:30,coins:10,free:3,am:0,me:0};
const M=[{n:'FREE',i:'⛏',r:3/86400,u:'$0',d:'3 coins/day'},{n:'T1',i:'🧑',r:38.87/86400,u:'$2.99',d:'~39 coins/day'},{n:'T2',i:'👷',r:103.87/86400,u:'$7.99',d:'~104 coins/day'},{n:'T3',i:'🦺',r:259.87/86400,u:'$19.99',d:'~260 coins/day'},{n:'T4',i:'🤖',r:649.87/86400,u:'$49.99',d:'~650 coins/day'}];
const RK=[{n:'CRYPTOKING',g:8520000},{n:'MINEMASTER',g:6230000},{n:'GOLDRUSH',g:4910000},{n:'DEEPMINER',g:3840000}];

// Canvas
const gw=document.getElementById('gameWrap'),gc=document.getElementById('gcC'),gx=gc.getContext('2d');
let W=800,H=520;function rs(){const r=gw.getBoundingClientRect();if(r.width<10)return;W=gc.width=r.width*2;H=gc.height=r.height*2}rs();if(W<20)setTimeout(()=>{rs();draw();stC()},300);window.addEventListener('resize',()=>{rs();draw()});

const hist=[];let pts=[],phase='wait',pT=3,mult=1,cp=0,bets=[null,null,null],boost=1,boostT=0,autoC=[0,0,0],inv=0,scd=0;

function gCP(){const r=Math.random();if(r<.015)return 1;if(r<.38)return 1.1+Math.random()*1.5;if(r<.68)return 2.5+Math.random()*3;if(r<.86)return 5+Math.random()*8;if(r<.96)return 10+Math.random()*25;return 30+Math.random()*120}

function draw(){
  gx.fillStyle='#060910';gx.fillRect(0,0,W,H); // full wipe
  const cx=W/2;
  // Tech grid
  gx.strokeStyle='rgba(0,229,255,.03)';for(let i=1;i<40;i++){gx.beginPath();gx.moveTo(0,i*H*.025);gx.lineTo(W,i*H*.025);gx.stroke()}
  gx.strokeStyle='rgba(0,229,255,.05)';for(let i=1;i<12;i++){gx.beginPath();gx.moveTo(i*W*.08,0);gx.lineTo(i*W*.08,H*.75);gx.stroke()}
  gx.strokeStyle='rgba(0,229,255,.08)';gx.lineWidth=1;gx.beginPath();gx.moveTo(cx,0);gx.lineTo(cx,H*.75);gx.stroke();

  // ── HELIPAD (always visible) ──
  const padX=W*.5,padY=H*.85;
  gx.strokeStyle='rgba(255,255,255,.1)';gx.lineWidth=2;
  gx.beginPath();gx.arc(padX,padY,36,0,Math.PI*2);gx.stroke();
  gx.strokeStyle='rgba(255,255,255,.06)';gx.lineWidth=1;
  gx.beginPath();gx.arc(padX,padY,44,0,Math.PI*2);gx.stroke();
  gx.fillStyle='rgba(255,255,255,.15)';gx.font='bold 26px sans-serif';gx.textAlign='center';gx.textBaseline='middle';
  gx.fillText('H',padX,padY);
  gx.strokeStyle='rgba(255,255,255,.06)';gx.setLineDash([4,8]);gx.lineWidth=1;
  gx.beginPath();gx.moveTo(padX-28,padY-28);gx.lineTo(padX+28,padY+28);gx.stroke();
  gx.beginPath();gx.moveTo(padX+28,padY-28);gx.lineTo(padX-28,padY+28);gx.stroke();
  gx.setLineDash([]);

  // Corner accents
  [{x:0,y:0},{x:W-1,y:0},{x:0,y:H-1},{x:W-1,y:H-1}].forEach(cr=>{gx.strokeStyle='rgba(0,229,255,.08)';gx.lineWidth=1;gx.strokeRect(cr.x,cr.y,1,1)});

  const dm=phase==='fly'?mult:(phase==='end'?cp:1);
  // Countdown
  if(phase==='wait'&&pT>0){const sec=Math.ceil(pT);gx.strokeStyle='rgba(0,229,255,.15)';gx.lineWidth=3;gx.beginPath();gx.arc(cx,H*.42,44,0,Math.PI*2);gx.stroke();gx.shadowColor='rgba(0,229,255,.2)';gx.shadowBlur=12;gx.fillStyle='#fff';gx.font='bold 52px sans-serif';gx.textAlign='center';gx.fillText(sec,cx,H*.42+16);gx.shadowBlur=0}
  // Multiplier (only during flight)
  const multY=H*.48;
  if(phase==='fly'){
    gx.shadowColor='rgba(0,230,118,.4)';gx.shadowBlur=30;
    gx.fillStyle='#00e676';gx.font='bold 80px sans-serif';gx.textAlign='center';
    gx.fillText(dm.toFixed(2)+'×',cx,multY);
    gx.shadowBlur=0;
  } else if(phase==='wait'&&pT<=0){
    gx.fillStyle='rgba(255,255,255,.06)';gx.font='bold 52px sans-serif';gx.textAlign='center';
    gx.fillText('1.00×',cx,multY);
  }

  // Airplane flight (phase==='fly' only) - random left/right
  if(phase==='fly'){
    const progress=Math.min(1,(dm-1)/22);
    const waveFreq=3.5,waveAmp=W*.06;
    const sx=W*.5,sy=H*.85; // start: bottom center helipad
    // Random direction per round - seed from crashPoint
    const goLeft=((cp*100)|0)%2===0;
    const ex=goLeft?W*.12:W*.88,ey=H*.08; // end: top-left or top-right
    const t=progress;
    const dx=ex-sx,dy=ey-sy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const nx=-dy/dist,ny=dx/dist;
    const wave=Math.sin(t*Math.PI*waveFreq)*waveAmp*(1-t);
    const rx=sx+dx*t+nx*wave;
    const ry=sy+dy*t+ny*wave;
    const angle=goLeft?Math.PI/3.5:Math.PI/4.5;
    const rocketX=Math.max(15,Math.min(W-15,rx));
    const rocketY=Math.max(5,Math.min(H-5,ry));
    const scale=1.0-progress*.2; // keep plane visible

    // ── WAVE TRAIL ──
    if(phase==='fly'){
      for(let i=0;i<30;i++){
        const pt=i/30;
        if(pt>progress)continue;
        const pw=Math.sin(pt*Math.PI*waveFreq)*waveAmp*(1-pt);
        const ppx=sx+dx*pt+nx*pw,ppy=sy+dy*pt+ny*pw;
        gx.fillStyle=`rgba(0,229,255,${.07-pt*.06})`;
        gx.beginPath();gx.arc(ppx+(Math.random()-.5)*3,ppy+(Math.random()-.5)*3,2-pt*1.5,0,Math.PI*2);gx.fill();
      }
    }

    // ── AIRPLANE (with banking, speed lines, dynamic flame) ──
    const bankAngle=Math.sin(t*2.5)*.25; // gentle banking
    const flameSize=1+progress*2; // flame grows as speed increases
    gx.save();gx.translate(rocketX,rocketY);gx.scale(scale,scale);gx.rotate(-angle+bankAngle);

    // ── SPEED LINES (at higher multipliers) ──
    if(progress>.3){
      for(let i=0;i<4;i++){
        const sl=10+Math.random()*25;
        gx.strokeStyle=`rgba(255,255,255,${.08+progress*.1})`;
        gx.lineWidth=1;
        gx.beginPath();gx.moveTo((Math.random()-.5)*40,-15-sl);gx.lineTo((Math.random()-.5)*20,-15-sl-8);gx.stroke();
      }
    }

    // ── JET FLAME (bigger as multiplier increases) ──
    gx.fillStyle='#f97316';
    gx.beginPath();gx.moveTo(-6*flameSize,14);gx.quadraticCurveTo(-3,26+Math.random()*6,0,34*flameSize+Math.random()*10);gx.quadraticCurveTo(3,26+Math.random()*6,6*flameSize,14);gx.fill();
    gx.fillStyle='#fbbf24';
    gx.beginPath();gx.moveTo(-4,12);gx.quadraticCurveTo(-2,20+Math.random()*4,0,26*flameSize+Math.random()*6);gx.quadraticCurveTo(2,20+Math.random()*4,4,12);gx.fill();
    gx.fillStyle='#fef3c7';
    gx.beginPath();gx.moveTo(-3,10);gx.quadraticCurveTo(-1,15+Math.random()*3,0,18*flameSize+Math.random()*4);gx.quadraticCurveTo(1,15+Math.random()*3,3,10);gx.fill();
    // Flame spark particles
    for(let i=0;i<6;i++){
      gx.fillStyle=`rgba(251,191,36,${.2+Math.random()*.4})`;
      gx.beginPath();gx.arc((Math.random()-.5)*12,18+Math.random()*22*flameSize,1+Math.random()*2,0,Math.PI*2);gx.fill();
    }

    // ── CONTRAIL (smoke trail) ──
    for(let i=0;i<4;i++){
      gx.fillStyle=`rgba(200,210,220,${.04-i*.008})`;
      gx.beginPath();gx.arc((Math.random()-.5)*12,16+i*8,3+i,0,Math.PI*2);gx.fill();
    }

    // Fuselage (body)
    const fg=gx.createLinearGradient(0,-18,0,10);
    fg.addColorStop(0,'#fff');fg.addColorStop(.4,'#e8ecf2');fg.addColorStop(1,'#94a3b8');
    gx.fillStyle=fg;
    gx.beginPath();gx.ellipse(0,-2,6,20,0,0,Math.PI*2);gx.fill();
    // Nose
    gx.fillStyle='#ff3d4f';
    gx.beginPath();gx.moveTo(0,-24);gx.quadraticCurveTo(5,-14,6,-20);gx.quadraticCurveTo(-6,-20,-5,-14);gx.fill();

    // Wings

    gx.beginPath();gx.moveTo(-3,-5);gx.lineTo(-18,-2);gx.lineTo(-18,4);gx.lineTo(-3,2);gx.fill();
    gx.beginPath();gx.moveTo(3,-5);gx.lineTo(18,-2);gx.lineTo(18,4);gx.lineTo(3,2);gx.fill();
    // Wing tips red
    gx.fillStyle='#ff3d4f';
    gx.fillRect(-18,-2,3,6);gx.fillRect(15,-2,3,6);

    // Tail fin
    gx.fillStyle='#ff3d4f';
    gx.beginPath();gx.moveTo(-3,10);gx.lineTo(-8,18);gx.lineTo(0,14);gx.fill();
    gx.beginPath();gx.moveTo(3,10);gx.lineTo(8,18);gx.lineTo(0,14);gx.fill();

    // Windows
    gx.fillStyle='#60a5fa';
    [{y:-10},{y:-5},{y:0}].forEach(w=>{gx.beginPath();gx.arc(0,w.y,2,0,Math.PI*2);gx.fill()});

    // ── ENGINE GLOW ──

  }

  if(phase==='end'){

    const esx=W*.5,esy=H*.85,eex=eGoLeft?W*.12:W*.88,eey=H*.08;

    });
    for(let i=0;i<45;i++){const a=Math.random()*Math.PI*2,d=10+Math.random()*55;gx.fillStyle=`rgba(${255-Math.random()*130},${Math.random()*120},${Math.random()*50},${.2+Math.random()*.35})`;gx.beginPath();gx.arc(ex+Math.cos(a)*d,ey+Math.sin(a)*d,1+Math.random()*5,0,Math.PI*2);gx.fill()}
    const fb=gx.createRadialGradient(ex,ey,0,ex,ey,36);
    fb.addColorStop(0,'rgba(255,240,200,.75)');fb.addColorStop(.15,'rgba(255,180,30,.5)');fb.addColorStop(.4,'rgba(255,60,10,.25)');fb.addColorStop(1,'rgba(0,0,0,0)');
    gx.fillStyle=fb;gx.beginPath();gx.arc(ex,ey,36,0,Math.PI*2);gx.fill();
    const fb2=gx.createRadialGradient(ex,ey,0,ex,ey,22);
    fb2.addColorStop(0,'rgba(255,255,255,.6)');fb2.addColorStop(.3,'rgba(255,200,50,.3)');fb2.addColorStop(1,'rgba(255,0,0,0)');
    gx.fillStyle=fb2;gx.beginPath();gx.arc(ex,ey,22,0,Math.PI*2);gx.fill();
    gx.fillStyle='#ff3d4f';gx.font='bold 30px sans-serif';gx.textAlign='center';
    gx.shadowColor='rgba(255,0,0,.5)';gx.shadowBlur=18;
    gx.fillText('💥 '+cp.toFixed(2)+'×',ex,ey-44);
    gx.shadowBlur=0;
  }else if(phase==='wait'&&pT<=0){gx.font='36px sans-serif';gx.textAlign='center';gx.fillText('🚀',cx,H*.55)}
  pts=pts.filter(p=>p.life>0);pts.forEach(p=>{p.life-=.014;p.y-=p.vy;p.vy+=.05;p.x+=p.vx;gx.globalAlpha=p.life;gx.fillStyle=p.c;gx.beginPath();gx.arc(p.x,p.y,p.s,0,Math.PI*2);gx.fill()});gx.globalAlpha=1;
}
