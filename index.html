<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Rocket Crash</title>
<style>
:root{--bg:#0a0a0a;--panel:#111111;--card:#151515;--input:#1a1a1a;--border:#222;--gold:#f0a020;--txt:#ccc;--dim:#666;--grn:#00c853;--red:#e53935;--cyan:#00bcd4;--wht:#eee}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);display:flex;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.app{width:100%;max-width:420px;display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ── TOP BAR ── */
.top{display:flex;align-items:center;gap:6px;padding:10px 12px;background:var(--panel);flex-shrink:0;border-bottom:1px solid var(--border)}
.tg{color:var(--gold);font-weight:700;font-size:14px;flex:1;display:flex;align-items:center;gap:4px}
.tb{font-size:11px;font-weight:600;padding:5px 8px;border-radius:4px;background:var(--card);border:1px solid var(--border)}
.tb.h{color:#9e86ff}.tb.f{color:var(--grn)}.tb.c{color:#e0a040}.tb.u{cursor:pointer;color:var(--wht);font-size:10px}

/* ── GAME ── */
.game{flex:1;position:relative;overflow:hidden;min-height:0;background:#080808}
canvas{display:block;width:100%;height:100%}

/* ── HISTORY ── */
.hw{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:6px 10px}
.hist{display:flex;flex-wrap:wrap;gap:3px;max-height:50px;overflow:hidden;transition:max-height .3s}.hist.open{max-height:300px}
.hist span{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px}
.hist .hg{color:var(--grn);background:rgba(0,200,83,.06)}.hist .hr{color:var(--red);background:rgba(229,57,53,.06)}
.ht{font-size:9px;color:var(--dim);cursor:pointer;text-align:center;margin-top:2px}

/* ── ROUND BAR ── */
.rb{flex-shrink:0;padding:12px;text-align:center;font-size:14px;font-weight:700;letter-spacing:1px;background:var(--panel);border-bottom:1px solid var(--border);text-transform:uppercase}
.rb.w{color:var(--dim)}.rb.f{color:var(--wht)}.rb.e{color:var(--red)}

/* ── BET PANELS ── */
.bp{flex-shrink:0;background:var(--panel);padding:10px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.br{display:flex;align-items:center;gap:6px}
.br .lb{color:var(--dim);font-weight:700;font-size:12px;width:18px}
.br .bqs{display:flex;gap:4px;flex:1}
.br .bqs span{padding:6px 0;border-radius:4px;text-align:center;font-weight:600;cursor:pointer;font-size:12px;flex:1;background:var(--input);color:var(--dim);border:1px solid var(--border)}
.br .bqs span.on{border-color:var(--gold);color:var(--gold)}
.br input.amt{width:56px;background:var(--input);border:1px solid var(--border);border-radius:4px;padding:8px 4px;text-align:center;color:var(--wht);font-weight:600;font-size:13px;flex-shrink:0}
.br input.amt:focus{outline:none;border-color:var(--gold)}
.br input.acp{width:44px;background:rgba(229,57,53,.04);border:1px dashed rgba(229,57,53,.2);border-radius:4px;padding:8px 2px;text-align:center;color:var(--red);font-weight:600;font-size:10px;flex-shrink:0}
.br input.acp:focus{outline:none;border-color:var(--red);border-style:solid}
.br .sep{color:var(--dim);font-size:10px;flex-shrink:0}
.ac{font-weight:700;font-size:11px;padding:7px 8px;border-radius:4px;border:1px solid;cursor:pointer;min-width:52px;text-align:center;flex-shrink:0;text-transform:uppercase}
.ac.bet{background:var(--input);color:var(--cyan);border-color:var(--border)}.ac.bet.done{background:rgba(0,200,83,.06);color:var(--grn);border-color:rgba(0,200,83,.2)}
.ac.out{background:rgba(229,57,53,.08);color:var(--wht);border-color:var(--red);animation:cp .7s ease-in-out infinite;display:none}.ac.out.on{display:block}
.ac.res{font-weight:700;font-size:11px;padding:7px 8px;border-radius:4px;min-width:52px;text-align:center;flex-shrink:0;display:none}
.ac.win{background:rgba(0,200,83,.06);color:var(--grn);border:1px solid rgba(0,200,83,.2)}.ac.lose{background:rgba(229,57,53,.06);color:var(--red);border:1px solid rgba(229,57,53,.15)}
@keyframes cp{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 10px rgba(229,57,53,.3)}}

/* ── BOTTOM ── */
.btm{flex-shrink:0;background:var(--panel);padding:8px 10px;border-top:1px solid var(--border)}
.btns{display:flex;gap:6px}.btns .b{flex:1;background:var(--card);border-radius:6px;padding:10px 0;text-align:center;font-size:11px;font-weight:600;color:var(--txt);cursor:pointer;border:1px solid var(--border)}.btns .b:active{background:var(--input)}.btns .b i{font-size:15px;display:block;margin-bottom:2px}

/* ── POPUP ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:80;display:flex;align-items:center;justify-content:center;animation:fi .15s}
@keyframes fi{0%{opacity:0}100%{opacity:1}}
.pu{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;width:92%;max-width:370px;max-height:80vh;overflow-y:auto}
.pt{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between}.pt span{color:var(--dim);cursor:pointer;font-size:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.gi{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 6px;text-align:center;cursor:pointer}.gi:active{background:var(--input)}.gi .i{font-size:22px}.gi .n{font-size:11px;font-weight:600;margin:3px 0}.gi .d{font-size:9px;color:var(--dim)}.gi .c{font-size:11px;font-weight:600;color:var(--gold)}
.rr{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);margin-bottom:2px;font-size:11px;border-radius:4px}.rr.my{background:rgba(240,160,32,.04);border:1px solid rgba(240,160,32,.1)}.rr .n{font-weight:700;font-size:13px;width:22px;text-align:center;color:var(--dim)}.rr .n.g{color:#fbbf24}.rr .n.s{color:#c0c0c0}.rr .n.b{color:#d97706}
.bb{flex:1;text-align:center;padding:9px 5px;border-radius:4px;cursor:pointer;font-weight:600;font-size:10px;background:var(--card);color:var(--gold);border:1px solid var(--border)}.bb.best{background:rgba(124,58,237,.12);color:#fff;border-color:rgba(124,58,237,.25)}

/* ── MINER PAGE ── */
.mp{position:fixed;inset:0;z-index:60;background:#3a7bd5;display:none;flex-direction:column;animation:fi .2s}.mp.on{display:flex}
.mtop{display:flex;align-items:center;gap:6px;padding:10px 12px;background:rgba(0,0,0,.2)}.mback{font-size:16px;cursor:pointer;padding:4px 8px;color:#fff}
.mcv{flex:1;position:relative;overflow:hidden}.mcv canvas{display:block;width:100%;height:100%}
.mcd{flex-shrink:0;padding:8px;display:flex;gap:6px;overflow-x:auto;background:rgba(0,0,0,.25)}
.mcd .mc{flex:0 0 85px;background:rgba(0,0,0,.2);border-radius:6px;padding:10px 5px;text-align:center;border:1px solid rgba(255,255,255,.06);cursor:pointer}.mcd .mc:active{background:rgba(0,0,0,.4)}.mcd .mc.ow{border-color:rgba(0,200,83,.25)}.mcd .mc.at{border-color:var(--gold)}.mcd .mc .i{font-size:26px;margin:2px 0}.mcd .mc .n{font-weight:600;font-size:10px;color:#fff}.mcd .mc .r{font-size:8px;color:rgba(255,255,255,.4)}.mcd .mc .c{font-weight:600;font-size:9px;color:var(--gold);margin-top:2px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-weight:600;padding:8px 16px;border-radius:6px;font-size:12px;z-index:100;pointer-events:none;animation:ti .2s ease-out,to .3s 1.5s ease-out forwards}
.toast.n{background:#222;color:var(--gold);border:1px solid #333}.toast.r{background:#1a2a1a;color:var(--grn);border:1px solid rgba(0,200,83,.15)}.toast.l{background:#1a1a2a;color:#9e86ff;border:1px solid rgba(124,58,237,.15)}
@keyframes ti{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to{0%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class="app">
<div class="top">
  <div class="tg">🪙 <span id="cD">500</span></div>
  <div class="tb h">⛏<span id="mLv">Free</span> <span id="mRt">+4/h</span></div>
  <div class="tb f">🆓<span id="fD">3</span></div>
  <div class="tb c">🎮<span id="gD">10</span></div>
  <div class="tb u" id="btnProfile">👤 <span id="userName">--</span></div>
</div>

<div class="game" id="gameWrap"><canvas id="gc"></canvas></div>

<div class="hw"><div class="hist" id="histBar"></div><div class="ht" id="histTg">Full History ▼</div></div>

<div class="rb w" id="roundBar">PLACE YOUR BETS</div>

<div class="bp">
  <div class="br"><span class="lb">1</span><div class="bqs" id="q1"><span class="on" data-v="1">1</span><span data-v="5">5</span><span data-v="10">10</span></div><input class="amt" id="in1" value="1" type="number" inputmode="numeric"><span class="sep">@</span><input class="acp" id="ac1" value="" placeholder="止盈x" type="number" inputmode="decimal" step="0.1"><button class="ac bet" id="bt1">BET</button><button class="ac out" id="co1">CASH OUT</button><div class="ac res" id="re1">--</div></div>
  <div class="br"><span class="lb">2</span><div class="bqs" id="q2"><span data-v="1">1</span><span class="on" data-v="5">5</span><span data-v="10">10</span></div><input class="amt" id="in2" value="5" type="number" inputmode="numeric"><span class="sep">@</span><input class="acp" id="ac2" value="" placeholder="止盈x" type="number" inputmode="decimal" step="0.1"><button class="ac bet" id="bt2">BET</button><button class="ac out" id="co2">CASH OUT</button><div class="ac res" id="re2">--</div></div>
</div>

<div class="btm"><div class="btns"><div class="b" id="btnMine"><i>⛏️</i>Mine</div><div class="b" id="btnShop"><i>💎</i>Shop</div><div class="b" id="btnRank"><i>🏆</i>Rank</div><div class="b" id="btnInvite"><i>📤</i>Invite</div></div></div>

<div class="mp" id="minerPg">
  <div class="mtop"><span class="mback" id="minerBack">← Back</span><span style="color:#fff;flex:1;font-weight:700">🪙 <span id="mG">0</span></span><span style="color:rgba(255,255,255,.6)">⛏ <span id="mR">0</span>/s</span></div>
  <div class="mcv" id="minerCv"><canvas id="mc"></canvas></div>
  <div class="mcd" id="minerCd"></div>
</div>
</div>

<script>
// ── STATE ──
let user={id:'player_'+Math.random().toString(36).slice(2,8),name:'Miner_'+Math.random().toString(36).slice(2,6)};
if(window.Telegram&&window.Telegram.WebApp){const tg=window.Telegram.WebApp;tg.ready();user={id:tg.initDataUnsafe?.user?.id||user.id,name:tg.initDataUnsafe?.user?.first_name||tg.initDataUnsafe?.user?.username||user.name};tg.expand()}
try{const s=JSON.parse(localStorage.getItem('ruser'));if(s)user={...user,...s}}catch(e){}
function saveUser(){localStorage.setItem('ruser',JSON.stringify(user))}saveUser();

const S={gold:500,hash:0,totalHash:30,coins:10,free:3,activeMiner:0,minerExp:0};
const mDefs=[{n:'Free Miner',i:'⛏️',rate:3/86400,usd:'$0',d:'3 coins/day',t:'🆓'},{n:'Apprentice',i:'🧑‍🌾',rate:38.87/86400,usd:'$2.99',d:'~39 coins/day',t:'T1'},{n:'Miner',i:'👷',rate:103.87/86400,usd:'$7.99',d:'~104 coins/day',t:'T2'},{n:'Engineer',i:'🦺',rate:259.87/86400,usd:'$19.99',d:'~260 coins/day',t:'T3'},{n:'AI Robot',i:'🤖',rate:649.87/86400,usd:'$49.99',d:'~650 coins/day',t:'T4'}];
const mockR=[{n:'CryptoKing',g:8520000},{n:'MineMaster',g:6230000},{n:'GoldRush',g:4910000},{n:'DeepMiner',g:3840000},{n:'HookLord',g:2750000},{n:'DiamondHands',g:1920000}];

// ── ROCKET CANVAS ──
const gw=document.getElementById('gameWrap'),gc=document.getElementById('gc'),gx=gc.getContext('2d');
let W=800,H=600;function rs(){const r=gw.getBoundingClientRect();if(r.width<10||r.height<10)return;W=gc.width=r.width*2;H=gc.height=r.height*2}rs();if(!W||W<20)setTimeout(()=>{rs();draw();startCD()},500);window.addEventListener('resize',()=>{rs();draw()});

const past=[];let particles=[],phase='wait',phaseT=3,mult=1,cp=0,bets=[null,null],boostMult=1,boostEnd=0,autoCash=[0,0],inviteCount=0,shareCD=0;

function genCP(){const r=Math.random();if(r<.015)return 1;if(r<.38)return 1.1+Math.random()*1.5;if(r<.68)return 2.5+Math.random()*3;if(r<.86)return 5+Math.random()*8;if(r<.96)return 10+Math.random()*25;return 30+Math.random()*120}

function draw(){
  gx.clearRect(0,0,W,H);const cx=W/2;
  gx.fillStyle='#080808';gx.fillRect(0,0,W,H);
  gx.strokeStyle='rgba(255,255,255,.015)';for(let i=1;i<14;i++){gx.beginPath();gx.moveTo(0,i*H*.035);gx.lineTo(W,i*H*.035);gx.stroke()}gx.strokeStyle='rgba(255,255,255,.02)';gx.lineWidth=1;gx.beginPath();gx.moveTo(cx,0);gx.lineTo(cx,H*.55);gx.stroke();

  const dm=phase==='fly'?mult:(phase==='end'?cp:1);
  if(phase==='wait'&&phaseT>0){const sec=Math.ceil(phaseT);gx.fillStyle='rgba(255,255,255,.04)';gx.beginPath();gx.arc(cx,H*.4,48,0,Math.PI*2);gx.fill();gx.strokeStyle='rgba(255,255,255,.1)';gx.lineWidth=2;gx.beginPath();gx.arc(cx,H*.4,48,0,Math.PI*2);gx.stroke();gx.fillStyle='var(--wht)';gx.fillStyle='#eee';gx.font='bold 44px sans-serif';gx.textAlign='center';gx.fillText(sec,cx,H*.4+14)}
  gx.fillStyle=phase==='end'?'#e53935':phase==='fly'?'#4ade80':'rgba(255,255,255,.08)';gx.font=`bold ${phase==='fly'?56:32}px sans-serif`;gx.textAlign='center';
  if(phase!=='wait'||phaseT<=0)gx.fillText(dm.toFixed(2)+'x',cx,phase==='fly'?H*.22:H*.16);
  if(phase==='fly'||phase==='end'){
    const ry=H*.1+(1-dm/15)*H*.26,cy=Math.max(H*.03,Math.min(H*.38,ry));
    if(phase==='fly'){gx.fillStyle='#f97316';gx.beginPath();gx.moveTo(cx-9,cy+14);gx.lineTo(cx,cy+32+Math.random()*10);gx.lineTo(cx+9,cy+14);gx.fill();gx.fillStyle='#fbbf24';gx.beginPath();gx.moveTo(cx-6,cy+12);gx.lineTo(cx,cy+22+Math.random()*6);gx.lineTo(cx+6,cy+12);gx.fill()}
    const gd=gx.createLinearGradient(cx,cy-20,cx,cy+14);gd.addColorStop(0,'#f1f5f9');gd.addColorStop(.5,'#cbd5e1');gd.addColorStop(1,'#64748b');gx.fillStyle=gd;gx.beginPath();gx.moveTo(cx,cy-20);gx.quadraticCurveTo(cx+10,cy-4,cx+10,cy+9);gx.lineTo(cx-10,cy+9);gx.quadraticCurveTo(cx-10,cy-4,cx,cy-20);gx.fill();gx.fillStyle='#e53935';gx.beginPath();gx.moveTo(cx-10,cy+2);gx.lineTo(cx-15,cy+12);gx.lineTo(cx-8,cy+8);gx.fill();gx.beginPath();gx.moveTo(cx+10,cy+2);gx.lineTo(cx+15,cy+12);gx.lineTo(cx+8,cy+8);gx.fill();gx.fillStyle='#e53935';gx.beginPath();gx.moveTo(cx,cy-26);gx.quadraticCurveTo(cx+5,cy-14,cx+8,cy-20);gx.quadraticCurveTo(cx-8,cy-20,cx-5,cy-14);gx.fill();gx.fillStyle='#60a5fa';gx.beginPath();gx.arc(cx,cy-6,5,0,Math.PI*2);gx.fill();gx.fillStyle='rgba(255,255,255,.25)';gx.beginPath();gx.arc(cx-1,cy-8,2,0,Math.PI*2);gx.fill();
    if(phase==='end')for(let i=0;i<8;i++){gx.fillStyle=`rgba(229,57,53,${Math.random()*.2})`;gx.beginPath();gx.arc(cx+(Math.random()-.5)*26,cy+(Math.random()-.5)*14,1+Math.random()*3,0,Math.PI*2);gx.fill()}
  }else if(phaseT<=0){gx.font='42px serif';gx.textAlign='center';gx.fillText('🚀',cx,H*.32)}
  particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.life-=.014;p.y-=p.vy;p.vy+=.05;p.x+=p.vx;gx.globalAlpha=p.life;gx.fillStyle=p.color;gx.beginPath();gx.arc(p.x,p.y,p.s,0,Math.PI*2);gx.fill()});gx.globalAlpha=1;
}
setInterval(()=>{draw()},50);

function startCD(){phase='wait';mult=1;cp=0;bets=[null,null];updateBtns();document.getElementById('roundBar').textContent='PLACE YOUR BETS';document.getElementById('roundBar').className='rb w';phaseT=3;draw();let cd=setInterval(()=>{phaseT--;document.getElementById('roundBar').textContent='ROUND IN '+Math.ceil(phaseT)+'s';draw();if(phaseT<=0){clearInterval(cd);startFly()}},1000)}
function startFly(){phase='fly';mult=1;cp=genCP();updateBtns();document.getElementById('roundBar').textContent='FLYING — TAP CASH OUT';document.getElementById('roundBar').className='rb f';(function step(){if(phase!=='fly')return;mult+=.02+mult*.003;draw();bets.forEach((b,i)=>{if(b&&!b.cashedOut){const t=b.autoCash||autoCash[i];if(t&&mult>=t)cashOutBet(i)}});if(mult>=cp){endR(false);return}requestAnimationFrame(step)})()}
function endR(cashed){phase='end';cp=cashed?mult:cp;past.unshift(cp);if(past.length>25)past.pop();renderHist();bets.forEach((b,i)=>{if(b&&!b.cashedOut){b.cashedOut=true;b.cashM=cp;b.won=0}});for(let i=0;i<25;i++)particles.push({x:W/2,y:H*.22,vx:(Math.random()-.5)*7,vy:-Math.random()*5,s:1+Math.random()*4,color:cashed?'#4ade80':i%2?'#e53935':'#f97316',life:1});document.getElementById('roundBar').textContent=cashed?`CASHED OUT @ ${cp.toFixed(2)}x`:`CRASHED @ ${cp.toFixed(2)}x`;document.getElementById('roundBar').className='rb e';updateBtns();showRes();draw();setTimeout(startCD,3000)}
function placeBet(s){if(phase!=='wait')return;const amt=Math.max(1,Math.min(10000,parseInt(document.getElementById('in'+(s+1)).value)||1));document.getElementById('in'+(s+1)).value=amt;const acv=parseFloat(document.getElementById('ac'+(s+1)).value);autoCash[s]=acv>=1.01?parseFloat(acv.toFixed(2)):0;let paid=false;if(S.free>0){S.free--;paid=true}else if(S.coins>=amt){S.coins-=amt;paid=true}else{const gn=amt*10;if(S.gold>=gn){S.gold-=gn;paid=true}else{toast(`Max: ${Math.floor(S.coins+S.gold/10)}`,'n');return}}if(!paid)return;bets[s]={amount:amt,cashedOut:false,cashM:0,won:undefined,autoCash:autoCash[s]};document.getElementById('bt'+(s+1)).textContent=autoCash[s]?'🎯':'✅';document.getElementById('bt'+(s+1)).classList.add('done');document.getElementById('co'+(s+1)).classList.add('on');upd()}
function cashOutBet(s){if(phase!=='fly'||!bets[s]||bets[s].cashedOut)return;const wasAuto=bets[s].autoCash&&mult>=bets[s].autoCash;bets[s].cashedOut=true;bets[s].cashM=mult;bets[s].won=Math.floor(bets[s].amount*mult);S.gold+=bets[s].won;document.getElementById('co'+(s+1)).classList.remove('on');document.getElementById('re'+(s+1)).textContent=(wasAuto?'🎯':'')+'+'+bets[s].won;document.getElementById('re'+(s+1)).className='ac res win';document.getElementById('re'+(s+1)).style.display='block';toast((wasAuto?'🎯 AUTO! ':'')+'+'+bets[s].won+' ('+mult.toFixed(2)+'x)','r');if(mult>=5&&shareCD<Date.now()){shareCD=Date.now()+60000;setTimeout(()=>{S.coins+=2;toast('📤 Share win! +2🎮','r');upd()},800)};upd()}
function showRes(){setTimeout(()=>{bets.forEach((b,i)=>{if(!b)return;const r=document.getElementById('re'+(i+1));r.style.display='block';if(b.won===undefined||b.won<=0){r.textContent='LOST';r.className='ac res lose'}else{r.textContent='+'+b.won;r.className='ac res win'}document.getElementById('co'+(i+1)).classList.remove('on')})},200);setTimeout(updateBtns,2500)}
function updateBtns(){['bt1','bt2'].forEach((id,i)=>{const bb=document.getElementById(id),cb=document.getElementById('co'+(i+1)),re=document.getElementById('re'+(i+1));re.style.display='none';if(phase==='wait'){cb.classList.remove('on');if(bets[i]){bb.textContent='✅';bb.classList.add('done')}else{bb.textContent='BET';bb.classList.remove('done')}}else if(phase==='fly'){bb.textContent='--';bb.classList.remove('done');if(bets[i]&&!bets[i].cashedOut)cb.classList.add('on');else cb.classList.remove('on')}})}
function renderHist(){document.getElementById('histBar').innerHTML=past.map(m=>`<span class="${m>=2?'hg':'hr'}">${m.toFixed(2)}x</span>`).join('')}

const Mc=document.getElementById('mc'),Mgx=Mc.getContext('2d');let MW,MH,minerAF=null;
function mRs(){const r=document.getElementById('minerCv').getBoundingClientRect();MW=Mc.width=r.width*2;MH=Mc.height=r.height*2}
function rMC(){document.getElementById('minerCd').innerHTML=mDefs.map((m,i)=>{const now=Date.now()/1000,active=S.activeMiner===i+1&&S.minerExp>now;let c='',ct;if(active)c='at';if(active)ct='⏳'+Math.ceil((S.minerExp-now)/3600)+'h';else if(i===0)ct='🆓';else ct=m.usd;return `<div class="mc ${c}" data-mi="${i}"><div class="i">${m.i}</div><div class="n">${m.n} ${m.t}</div><div class="r">${m.d}</div><div class="c">${ct}</div></div>`}).join('')}
function dM(){Mgx.clearRect(0,0,MW,MH);const cx=MW/2,t=Date.now()*.001,active=S.activeMiner>0&&S.minerExp>Date.now()/1000,tier=active?S.activeMiner:0,skyY=MH*.58;const sky=Mgx.createLinearGradient(0,0,0,skyY);sky.addColorStop(0,'#3b82f6');sky.addColorStop(.5,'#60a5fa');sky.addColorStop(1,'#93c5fd');Mgx.fillStyle=sky;Mgx.fillRect(0,0,MW,skyY);Mgx.fillStyle='rgba(255,255,255,.4)';[{x:.12,y:.1,r:18},{x:.48,y:.06,r:22},{x:.76,y:.11,r:15}].forEach(cl=>{Mgx.beginPath();Mgx.arc(cl.x*MW,cl.y*MH,cl.r,0,Math.PI*2);Mgx.fill()});const gnd=Mgx.createLinearGradient(0,skyY,0,MH);gnd.addColorStop(0,'#92400e');gnd.addColorStop(.2,'#78350f');gnd.addColorStop(1,'#451a03');Mgx.fillStyle=gnd;Mgx.fillRect(0,skyY,MW,MH-skyY);Mgx.fillStyle='#a16207';Mgx.fillRect(0,skyY-1,MW,4);Mgx.fillStyle='#ca8a04';Mgx.fillRect(0,skyY-1,MW,2);if(active){const rx=cx+90,ry=skyY-5,rr=32+Math.sin(t*6)*3;const gd=Mgx.createRadialGradient(rx-rr*.15,ry-rr*.25,rr*.08,rx,ry,rr);gd.addColorStop(0,'#fef3c7');gd.addColorStop(.35,'#fbbf24');gd.addColorStop(1,'#78350f');Mgx.fillStyle=gd;Mgx.beginPath();Mgx.arc(rx,ry,rr,0,Math.PI*2);Mgx.fill();Mgx.fillStyle='rgba(255,255,255,.3)';Mgx.beginPath();Mgx.arc(rx-rr*.18,ry-rr*.22,rr*.2,0,Math.PI*2);Mgx.fill();Mgx.save();Mgx.translate(rx-30,ry-8);Mgx.rotate(-.3+Math.sin(t*6)*.4);Mgx.strokeStyle='#8b6914';Mgx.lineWidth=3;Mgx.beginPath();Mgx.moveTo(0,0);Mgx.lineTo(0,30);Mgx.stroke();Mgx.fillStyle='#6b7280';Mgx.beginPath();Mgx.moveTo(-10,24);Mgx.lineTo(10,24);Mgx.lineTo(2,34);Mgx.lineTo(-10,24);Mgx.fill();Mgx.restore();for(let i=0;i<tier*2+2;i++){const a=Math.random()*Math.PI*2,d=rr+Math.random()*12;Mgx.fillStyle=`rgba(251,191,36,${.25+Math.random()*.4})`;Mgx.beginPath();Mgx.arc(rx+Math.cos(a)*d,ry+Math.sin(a)*d,1+Math.random()*2.5,0,Math.PI*2);Mgx.fill()}}const mx=cx-55,my=skyY-85;Mgx.fillStyle='rgba(0,0,0,.1)';Mgx.beginPath();Mgx.ellipse(cx-35,skyY+6,16,3,0,0,Math.PI*2);Mgx.fill();const bc=active?(tier>=4?'#7c3aed':tier>=3?'#22c55e':tier>=2?'#2563eb':'#d97706'):'#9ca3af';Mgx.fillStyle=bc;Mgx.fillRect(mx-1,my+32,22,26);Mgx.fillStyle='#1a0a02';Mgx.fillRect(mx-2,my+48,24,4);Mgx.fillStyle='#f5d0a9';Mgx.beginPath();Mgx.arc(mx+10,my+18,13,14,0,0,Math.PI*2);Mgx.fill();Mgx.fillStyle='#4a3728';Mgx.beginPath();Mgx.arc(mx+10,my+10,14,Math.PI,Math.PI*2);Mgx.fill();Mgx.fillRect(mx-3,my+4,26,8);Mgx.fillStyle='#fbbf24';Mgx.beginPath();Mgx.ellipse(mx+10,my+4,15,5,0,Math.PI,0);Mgx.fill();Mgx.fillStyle='#d97706';Mgx.fillRect(mx-5,my+0,30,4);Mgx.fillStyle=bc;Mgx.fillRect(mx-9,my+34,7,18);Mgx.fillRect(mx+21,my+34,7,18);Mgx.fillStyle='#4a3728';Mgx.fillRect(mx-3,my+54,8,14);Mgx.fillRect(mx+14,my+54,8,14);Mgx.fillStyle='#2a1a0a';Mgx.fillRect(mx-5,my+64,11,5);Mgx.fillRect(mx+12,my+64,11,5);if(active){Mgx.fillStyle='#1a0a02';Mgx.beginPath();Mgx.arc(mx+5,my+15,2.5,3,0,Math.PI*2);Mgx.fill();Mgx.beginPath();Mgx.arc(mx+15,my+15,2.5,3,0,Math.PI*2);Mgx.fill();Mgx.fillStyle='#fff';Mgx.beginPath();Mgx.arc(mx+4,my+14,1,0,Math.PI*2);Mgx.fill();Mgx.beginPath();Mgx.arc(mx+14,my+14,1,0,Math.PI*2);Mgx.fill();Mgx.strokeStyle='#1a0a02';Mgx.lineWidth=1.5;Mgx.beginPath();Mgx.arc(mx+10,my+21,4,0,Math.PI);Mgx.stroke()}Mgx.fillStyle='rgba(0,0,0,.5)';Mgx.fillRect(0,skyY+30,MW,30);Mgx.fillStyle='#fff';Mgx.font='bold 14px sans-serif';Mgx.textAlign='center';if(active)Mgx.fillText('⚡ +'+Math.floor(mDefs[tier].rate*3600)+' gold/hr  |  Tap for '+(2+Math.floor(tier/2))+'x BOOST',cx,skyY+50);else Mgx.fillText('Buy a miner to start!',cx,skyY+50);document.getElementById('mG').textContent=S.gold.toLocaleString();document.getElementById('mR').textContent=active?mDefs[tier].rate.toFixed(6):'0';minerAF=requestAnimationFrame(dM)}

document.getElementById('btnMine').addEventListener('click',()=>{document.getElementById('minerPg').classList.add('on');setTimeout(()=>{mRs();rMC();if(minerAF)cancelAnimationFrame(minerAF);minerAF=requestAnimationFrame(dM)},200)});
document.getElementById('minerBack').addEventListener('click',()=>{document.getElementById('minerPg').classList.remove('on');if(minerAF)cancelAnimationFrame(minerAF);upd()});
document.getElementById('minerCd').addEventListener('click',e=>{const card=e.target.closest('.mc');if(!card)return;const i=parseInt(card.dataset.mi),m=mDefs[i],now=Date.now()/1000;if(i===0){if(S.minerExp>now){toast('Already active','n');return}S.activeMiner=0;S.minerExp=now+86400;toast('🆓 Free miner!','r');rMC();upd();return}if(S.activeMiner===i+1&&S.minerExp>now){toast('⏳ '+Math.ceil((S.minerExp-now)/3600)+'h left','n');return}popup(m.n+' '+m.t,'<div style="text-align:center;padding:8px"><div style="font-size:40px">'+m.i+'</div><div style="font-weight:800;font-size:15px;margin:6px 0">'+m.n+' '+m.t+'</div><div style="color:var(--dim);font-size:12px">'+m.d+'</div><div style="font-size:22px;font-weight:900;color:#fbbf24;margin:8px 0">'+m.usd+'</div><div style="font-size:9px;color:var(--dim);margin-bottom:10px">Send USDT · DM @your_bot</div><div class="bb" style="width:100%;background:#22c55e;color:#000;padding:12px;display:block" id="demoB'+i+'">🔄 DEMO</div></div>',()=>{document.getElementById('demoB'+i).onclick=()=>{S.activeMiner=i+1;S.minerExp=Date.now()/1000+86400;toast('⛏ '+m.n+' 24h!','r');document.getElementById('ap')?.remove();rMC();upd()}})});
document.getElementById('minerCv').addEventListener('click',e=>{const now=Date.now()/1000;if(!(S.activeMiner>0&&S.minerExp>now)){toast('Buy a miner first!','n');return}if(boostEnd>now){toast('⚡ '+boostMult+'x for '+Math.ceil(boostEnd-now)+'s','n');return}boostMult=2+Math.floor(S.activeMiner/2);boostEnd=now+15;toast('⚡ '+boostMult+'x SPEED!','r');if(shareCD<Date.now()){shareCD=Date.now()+60000;setTimeout(()=>{S.free++;toast('📤 Share boost! +1🆓','r');upd()},1200)}const r=document.getElementById('minerCv').getBoundingClientRect(),fx=e.clientX-r.left,fy=e.clientY-r.top;const fn=document.createElement('div');fn.style.cssText='position:absolute;left:'+(fx-20)+'px;top:'+(fy-10)+'px;color:#22d3ee;font-weight:900;font-size:20px;pointer-events:none;z-index:70;animation:fl .9s ease-out forwards';fn.textContent=boostMult+'x!';document.getElementById('minerCv').appendChild(fn);setTimeout(()=>fn.remove(),900)});
const ms=document.createElement('style');ms.textContent='@keyframes fl{0%{opacity:1;transform:translateY(0) scale(.8)}100%{opacity:0;transform:translateY(-70px) scale(1.3)}}';document.head.appendChild(ms);

setInterval(()=>{const now=Date.now()/1000;let rate=3/86400;if(S.activeMiner>0&&S.minerExp>now)rate+=mDefs[S.activeMiner].rate;if(S.minerExp<=now&&S.activeMiner>0)S.activeMiner=0;if(now<boostEnd)rate*=boostMult;else boostMult=1;S.gold+=rate;upd()},1000);

upd();draw();startCD();
</script>
